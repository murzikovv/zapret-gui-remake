<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Default = dark theme */
        :root {
            --bg:     #181b25;
            --bg-2:   #131620;
            --text-1: #e8eaf0;
            --text-2: #8b90a0;
            --text-3: #525666;
            --accent: #5b8def;
            --success: #4ade80;
            --error:   #f87171;
            --border:  rgba(255,255,255,0.07);
            --border-s:rgba(255,255,255,0.12);
        }
        [data-theme="midnight"] {
            --bg:     #141830;
            --bg-2:   #0f1228;
            --text-1: #dde2f5;
            --text-2: #7880a8;
            --text-3: #424870;
            --accent: #7c9ef7;
            --success: #34d399;
            --border:  rgba(255,255,255,0.06);
            --border-s:rgba(255,255,255,0.11);
        }
        [data-theme="slate"] {
            --bg:     #1c2130;
            --bg-2:   #161a23;
            --text-1: #e2e8f0;
            --text-2: #94a3b8;
            --text-3: #4a5568;
            --accent: #60a5fa;
            --success: #4ade80;
            --border:  rgba(255,255,255,0.07);
            --border-s:rgba(255,255,255,0.13);
        }
        [data-theme="mocha"] {
            --bg:     #231e1a;
            --bg-2:   #1c1714;
            --text-1: #ede0d4;
            --text-2: #9a8f86;
            --text-3: #5a504a;
            --accent: #e08060;
            --success: #a6d189;
            --error:   #e78284;
            --border:  rgba(255,255,255,0.06);
            --border-s:rgba(255,255,255,0.10);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            overflow: hidden;
            border: 1px solid var(--border-s);
            border-radius: 12px;
            user-select: none;
            font-size: 13px;
            transition: background 0.2s, color 0.2s;
        }

        .header {
            padding: 11px 14px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .header-left { display:flex; align-items:center; gap:8px; font-weight:600; font-size:0.82rem; }

        .status-row {
            padding: 9px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.14);
            border-bottom: 1px solid var(--border);
        }
        .status-name {
            font-size: 0.75rem; color: var(--text-2);
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; max-width: 140px;
        }
        .status-indicator {
            display:flex; align-items:center; gap:5px;
            font-size: 0.65rem; font-weight:700;
            letter-spacing: 0.5px; color: var(--text-3);
        }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--text-3); transition: background .3s;
        }
        .dot.active {
            background: var(--success);
            box-shadow: 0 0 6px rgba(74,222,128,0.5);
        }

        .menu-item {
            padding: 9px 14px; cursor: pointer;
            display:flex; align-items:center; gap:10px;
            font-size:0.82rem; color:var(--text-2);
            transition: background .13s, color .13s;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: var(--text-1); }
        .menu-item.primary { color: var(--accent); font-weight:600; }
        .menu-item.primary:hover { background: rgba(91,141,239,0.08); color: var(--accent); }
        .menu-item.stop { color: var(--error); font-weight:600; }
        .menu-item.stop:hover { background: rgba(248,113,113,0.07); color: var(--error); }
        .menu-item.dimmed { color: var(--text-3); }

        .sep { height: 1px; background: var(--border); margin: 3px 0; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Zapret GUI
        </div>
    </div>

    <div class="status-row">
        <span class="status-name" id="strategy-name">Не активен</span>
        <div class="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">ВЫКЛ</span>
        </div>
    </div>

    <div id="start-btn" class="menu-item primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        Подключиться
    </div>
    <div id="stop-btn" class="menu-item stop" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        Отключиться
    </div>

    <div class="sep"></div>

    <div id="show-app" class="menu-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18"/>
        </svg>
        Открыть окно
    </div>

    <div id="quit-app" class="menu-item dimmed">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Выйти
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const strategyName = document.getElementById('strategy-name');
        const statusDot    = document.getElementById('status-dot');
        const statusText   = document.getElementById('status-text');
        const startBtn     = document.getElementById('start-btn');
        const stopBtn      = document.getElementById('stop-btn');

        ipcRenderer.on('update-status', (event, status) => {
            if (status.running) {
                strategyName.innerText = status.running.replace(/\.bat$/i, '');
                statusDot.classList.add('active');
                statusText.innerText = 'ВКЛ';
                statusText.style.color = 'var(--success)';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'flex';
            } else {
                strategyName.innerText = 'Не активен';
                statusDot.classList.remove('active');
                statusText.innerText = 'ВЫКЛ';
                statusText.style.color = '';
                startBtn.style.display = 'flex';
                stopBtn.style.display = 'none';
            }
        });

        ipcRenderer.on('update-theme', (event, theme) => {
            document.documentElement.setAttribute('data-theme', theme || 'dark');
        });

        startBtn.onclick = () => ipcRenderer.send('tray-action', 'start');
        stopBtn.onclick  = () => ipcRenderer.send('tray-action', 'stop');
        document.getElementById('show-app').onclick = () => ipcRenderer.send('tray-action', 'show');
        document.getElementById('quit-app').onclick = () => ipcRenderer.send('tray-action', 'quit');

        ipcRenderer.send('tray-action', 'request-status');
    </script>
</body>
</html>
